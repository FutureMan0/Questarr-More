# Bei jedem Push auf main: Production-Image nach GHCR pushen (Tag latest).
# Unraid-Docker kann dann „Update“ / neues Image ziehen — ohne lokales git/build.

name: Publish to GHCR (main)

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.2.0

      - name: Image name (GHCR, lowercase)
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_GHCR=ghcr.io/${OWNER}/questarr-more" >> "$GITHUB_ENV"

      - name: Log in to GitHub Container Registry
        uses: step-security/docker-login-action@6aa05fe688caf2c58e784663f01b3415ced503e8 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: step-security/setup-buildx-action@f931205d68723ad9589fd2a7e2ece238bf9de341 # v4.0.0

      - name: Build and push
        uses: step-security/docker-build-push-action@a8c3d08b23f8be6aeed43eb1a14ce6fe51284438 # v6.18.0
        with:
          context: .
          push: true
          tags: "${{ env.IMAGE_GHCR }}:latest"
          target: production
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
