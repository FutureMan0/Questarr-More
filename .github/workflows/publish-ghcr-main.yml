# Bei jedem Push auf main: Production-Image nach GHCR pushen (Tag latest).
# Unraid-Docker kann dann „Update“ / neues Image ziehen — ohne lokales git/build.

name: Publish to GHCR (main)

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write
  actions: write # buildx cache-to: type=gha

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.2.0

      - name: Image name (GHCR, lowercase)
        id: ghcr
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "image=ghcr.io/${OWNER}/questarr-more" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Build and push
        uses: docker/build-push-action@v6.18.0
        with:
          context: .
          push: true
          tags: "${{ steps.ghcr.outputs.image }}:latest"
          target: production
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
