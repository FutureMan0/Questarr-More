# Questarr More — Unraid: Image aus diesem Git-Repo bauen und Container starten.
#
# Voraussetzung: Repo auf dem Unraid-Server geklont (z. B. /mnt/user/docker/questarr-more).
#
# Einmalig bauen + im Hintergrund starten:
#   cd /mnt/user/docker/questarr-more
#   docker compose -f docker-compose.unraid.yml up -d --build
#
# Nur neu bauen nach Git-Pull:
#   docker compose -f docker-compose.unraid.yml build --no-cache
#   docker compose -f docker-compose.unraid.yml up -d
#
# Daten liegen standardmäßig unter /mnt/user/appdata/questarr-more (anpassbar unten).

services:
  questarr-more:
    build:
      context: .
      dockerfile: Dockerfile
    image: questarr-more:local
    container_name: Questarr-More
    restart: unless-stopped
    ports:
      - "${QUESTARR_MORE_HTTP_PORT:-5000}:5000"
      - "${QUESTARR_MORE_SSL_PORT:-9898}:9898"
    environment:
      TZ: ${TZ:-Europe/Berlin}
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      SQLITE_DB_PATH: /app/data/sqlite.db
      SSL_PORT: ${SSL_PORT:-9898}
    volumes:
      - ${QUESTARR_MORE_DATA:-/mnt/user/appdata/questarr-more}:/app/data
      # Zusätzliche Mounts (Pfade bei Bedarf in .env überschreiben)
      - ${QUESTARR_MORE_GAMES:-/mnt/user/games}:/games
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:5000/api/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
